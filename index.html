<!DOCTYPE html>
<html>
<head>
  <title>Outfit Randomizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Outfit Randomizer</h1>

<div class="section">
  <div class="history-header">
    <h2>Data</h2>
    <div>
      <button onclick="exportData()">Export Save File</button>
      <button onclick="document.getElementById('importFile').click()">Import Save File</button>
      <input id="importFile" type="file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<div class="section">
  <h2>Shirts</h2>
  <input id="shirtInput" placeholder="Add shirt name">
  <input id="shirtImage" type="file" accept="image/*">
  <button onclick="addItem('shirts')">Add</button>
  <div id="shirts" class="item-grid"></div>
</div>

<div class="section">
  <h2>Bottoms</h2>
  <input id="bottomInput" placeholder="Add bottoms name">
  <input id="bottomImage" type="file" accept="image/*">
  <button onclick="addItem('bottoms')">Add</button>
  <div id="bottoms" class="item-grid"></div>
</div>

<div class="section">
  <h2>Undershirts</h2>
  <input id="underInput" placeholder="Add undershirt name">
  <input id="underImage" type="file" accept="image/*">
  <button onclick="addItem('undershirts')">Add</button>
  <div id="undershirts" class="item-grid"></div>
</div>

<div class="section">
  <h2>Accessories</h2>
  <input id="accessoryInput" placeholder="Add accessory name">
  <input id="accessoryImage" type="file" accept="image/*">
  <button onclick="addItem('accessories')">Add</button>
  <div id="accessories" class="item-grid"></div>
</div>

<div class="section">
  <h2>Shoes</h2>
  <input id="shoeInput" placeholder="Add shoe name">
  <input id="shoeImage" type="file" accept="image/*">
  <button onclick="addItem('shoes')">Add</button>
  <div id="shoes" class="item-grid"></div>
</div>

<div class="section">
  <h2>Today's Outfit</h2>
  <div id="outfit" class="outfit-grid"></div>
  <button onclick="generateOutfit()">Generate Outfit</button>
</div>

<div class="section">
  <div class="history-header">
    <h2>Outfit History</h2>
    <button class="danger-btn" onclick="wipeHistory()">Wipe History</button>
  </div>
  <div id="history" class="history-list"></div>
</div>

<script src="script.js"></script>
</body>
</html>
